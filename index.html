<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Doctor Simulator Full Living Hospital</title>
<style>
:root{
  --bg:#07151f;--panel:#102637;--panel2:#17364b;--text:#f7fbff;--muted:#c9dceb;
  --accent:#9ee7ff;--danger:#ffb4b4;--warn:#ffe2a8;--good:#bdf8c8;--btn:#1f4a67;--btn2:#2b688f;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);line-height:1.45}
header{position:sticky;top:0;background:#081d2b;border-bottom:1px solid #2e5367;padding:12px;z-index:3}
main{max-width:1040px;margin:0 auto 80px;padding:12px}
.card{background:var(--panel);border:1px solid #294b60;border-radius:14px;margin:10px 0;padding:13px}
.card2{background:var(--panel2)}
h1,h2,h3{margin:0 0 8px}
.small{font-size:15px;color:var(--muted)}
button,input,textarea,select{font-size:18px;border-radius:12px;border:1px solid #5f8da6}
button{background:var(--btn);color:var(--text);min-height:52px;padding:11px 13px;margin:3px;cursor:pointer;text-align:left;width:100%}
button:focus,button:hover{background:var(--btn2);outline:3px solid var(--accent)}
button.smallButton{width:auto;min-height:44px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:8px}
.row{display:flex;flex-wrap:wrap;gap:4px}.row button{width:auto}
textarea,input,select{background:#071b27;color:var(--text);width:100%;padding:12px;margin:6px 0}
textarea{min-height:90px}
.good{color:var(--good)}.warn{color:var(--warn)}.danger{color:var(--danger)}
.held{font-weight:bold;color:var(--accent)}.bigAlert{font-size:19px;font-weight:bold}
.log{max-height:340px;overflow:auto}.log div{border-bottom:1px solid #24475c;padding:6px}
.patient{border-left:5px solid #5f8da6}.critical{border-left-color:#ff7777}.urgent{border-left-color:#ffe082}.stable{border-left-color:#8df0a1}
.tag{display:inline-block;background:#071b27;border:1px solid #33556b;border-radius:999px;padding:5px 9px;margin:3px}
.hidden{display:none}
</style>
</head>

let audioOn=true;
function play(name,reason,type='warn'){
  if(reason) announce(reason,type);
  if(!audioOn || !SOUND[name]) return;
  try{let a=new Audio(SOUND[name]);a.volume=.72;a.play().catch(()=>{});}catch(e){}
}
function speak(text){
  if(!G.settings.voice || !('speechSynthesis' in window)) return;
  let u=new SpeechSynthesisUtterance(text);
  u.rate=1; u.pitch=1.05;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}
function announce(text,type='warn'){G.lastAlert=text;addLog(text,type);speak(text)}

let aiGenerator=null;
let aiLoadError='';
async function loadLocalAI(){
 if(G.settings.aiLoaded&&aiGenerator)return true;
 if(G.settings.aiLoading)return false;
 G.settings.aiLoading=true;save();status();
 try{
   announce('Local AI is loading. The first load may take a while because the model has to download.','warn');
   const mod=await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');
   const pipeline=mod.pipeline;
   aiGenerator=await pipeline('text-generation',G.settings.aiModel,{quantized:true});
   G.settings.aiLoaded=true;
   G.settings.aiLoading=false;
   aiLoadError='';
   save();
   announce('Local AI loaded. Conversations can now use generated replies.','good');
   return true;
 }catch(e){
   aiLoadError=String(e&&e.message?e.message:e);
   G.settings.aiLoaded=false;
   G.settings.aiLoading=false;
   save();
   announce('Local AI could not load on this device or browser. The game will use the built-in conversation system.','warn');
   return false;
 }
}
function stopLocalAI(){
 aiGenerator=null;
 G.settings.aiLoaded=false;
 G.settings.aiLoading=false;
 save();
 announce('Local AI turned off. Built-in conversations will be used.','good');
}
function aiAvailable(){
 return G.settings&&G.settings.localAI&&G.settings.aiLoaded&&aiGenerator;
}
function cleanAIReply(text){
 text=String(text||'').replace(/\s+/g,' ').trim();
 text=text.replace(/^(patient|staff|visitor|doctor|reply|answer)\s*:\s*/i,'');
 text=text.split(' Doctor:')[0].split(' Player:')[0].split(' Patient:')[0].split(' Staff:')[0].split(' Visitor:')[0];
 if(text.length>260)text=text.slice(0,260).replace(/\s+\S*$/,'')+'.';
 if(!text)text='I hear you. I need a moment to think about that.';
 return text;
}
async function generateLocalReply(kind,person,playerText,extra){
 if(!aiAvailable())return null;
 let prompt='';
 if(kind==='patient'){
   prompt='You are a hospital patient in an accessible hospital simulator. Reply naturally in first person. Do not diagnose yourself. Keep it brief. Patient name: '+person.name+'. Age: '+person.age+'. Location: '+person.room+'. Illness clue: '+person.illness+'. Symptoms: '+person.symptoms.join(', ')+'. Pain: '+person.pain+'/10. Needs: '+(person.needs.map(plainItem).join(', ')||'none')+'. Mood and memory: helped '+person.memory.helped+' times, reassured '+person.memory.reassured+' times. Doctor says: '+playerText+' Patient replies:';
 }else if(kind==='staff'){
   prompt='You are a hospital staff member in a realistic hospital simulator. Reply naturally as a person before a professional. Keep it brief and human. Name: '+person.name+'. Role: '+person.role+'. Location: '+person.loc+'. Energy: '+Math.round(person.energy)+'. Hunger: '+Math.round(person.hunger)+'. Thirst: '+Math.round(person.thirst)+'. Current task: '+person.task+'. Doctor says: '+playerText+' Staff replies:';
 }else{
   prompt='You are a hospital visitor in a realistic hospital simulator. Reply naturally and briefly. Name: '+person.name+'. Mood: '+person.mood+'. Need: '+person.need+'. Doctor says: '+playerText+' Visitor replies:';
 }
 try{
   let out=await aiGenerator(prompt,{max_new_tokens:55,temperature:0.85,top_p:0.92,repetition_penalty:1.15,do_sample:true});
   let full=Array.isArray(out)?(out[0].generated_text||''):(out.generated_text||'');
   let reply=full.replace(prompt,'');
   return cleanAIReply(reply);
 }catch(e){
   aiLoadError=String(e&&e.message?e.message:e);
   addLog('Local AI reply failed, using built-in conversation.','warn');
   return null;
 }
}

function rnd(a){return a[Math.floor(Math.random()*a.length)]}
function r(n){return Math.floor(Math.random()*n)}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function clone(o){return JSON.parse(JSON.stringify(o))}
function esc(s){return String(s).replace(/'/g,"\\'")}
function load(){try{return JSON.parse(localStorage.getItem('hospitalFullLivingSave'))||clone(DEFAULT)}catch(e){return clone(DEFAULT)}}
function save(){localStorage.setItem('hospitalFullLivingSave',JSON.stringify(G))}
function init(){
 if(!G.timelines)G.timelines=[]; if(!G.activeConversations)G.activeConversations=[]; if(!G.concerns)G.concerns=[];
 Object.values(PICKUPS).flat().forEach(x=>{if(G.stock[x]==null)G.stock[x]=x.includes('Machine')||x.includes('Monitor')?8:45});

 if(!G.staff.length)G.staff=STAFF.map(s=>({id:gid(),name:s[0],role:s[1],loc:s[2],energy:80+r(18),hunger:r(30),thirst:r(30),morale:82,busy:false,task:'available',relationships:0}));
}
function timeText(){return 'Day '+G.time.day+', '+String(G.time.hour).padStart(2,'0')+':'+String(G.time.min).padStart(2,'0')}
function addLog(t,type=''){G.log.unshift({t,at:timeText(),type});if(G.log.length>260)G.log.pop();save()}
function status(){document.getElementById('status').textContent=G.started?timeText()+' | '+G.weather+' | '+G.loc+' | holding '+(G.held||'nothing')+' | reputation '+Math.round(G.reputation)+'%':'Not started'}

function tick(m=2){
 for(let i=0;i<m;i++){
  G.time.min++;
  if(G.time.min>=60){G.time.min=0;G.time.hour++}
  if(G.time.hour>=24){G.time.hour=0;G.time.day++;G.stats.daysWorked++;G.routineDone={};daily()}
  runRoutines();
  runTimelines();
  patientMinute();
  staffMinute();
  staffEmotionalMinute();
  patientMovementMinute();
  visitorMinute();
  if(Math.random()<.016)worldEvent();
  if(Math.random()<.02)ambientLife();
  spontaneousConversations();
 }
 G.player.hunger=Math.min(100,G.player.hunger+m*.035);
 G.player.thirst=Math.min(100,G.player.thirst+m*.055);
 G.player.energy=Math.max(0,G.player.energy-m*.025);
 checkAchievements();
 save();
}

function maybeRefreshView(){
 if(!G.started)return;
 let currentTitle=document.querySelector('h2');
 if(currentTitle&&currentTitle.textContent===G.loc)placeView();

function addTimeline(kind,actorId,stage,delayMin,data){
 G.timelines.push({id:gid(),kind,actorId,stage,dueDay:G.time.day,dueHour:G.time.hour,dueMin:G.time.min+delayMin,data:data||{}});
 normalizeTimeline(G.timelines[G.timelines.length-1]);
 save();
}
function normalizeTimeline(t){
 while(t.dueMin>=60){t.dueMin-=60;t.dueHour++}
 while(t.dueHour>=24){t.dueHour-=24;t.dueDay++}
}
function timelineDue(t){
 if(G.time.day>t.dueDay)return true;
 if(G.time.day<t.dueDay)return false;
 if(G.time.hour>t.dueHour)return true;
 if(G.time.hour<t.dueHour)return false;
 return G.time.min>=t.dueMin;
}
function runTimelines(){
 let due=G.timelines.filter(t=>timelineDue(t));
 G.timelines=G.timelines.filter(t=>!timelineDue(t));
 due.forEach(processTimeline);
}
function processTimeline(t){
 if(t.kind==='sickBuildUp')processSickBuildUp(t);
 else if(t.kind==='drinkBuildUp')processDrinkBuildUp(t);
 else if(t.kind==='blanketBuildUp')processBlanketBuildUp(t);
 else if(t.kind==='staffBreak')processStaffBreak(t);
 else if(t.kind==='staffTalk')processStaffTalk(t);
 else if(t.kind==='conversationNudge')processConversationNudge(t);
}
function processSickBuildUp(t){
 let p=G.patients.find(x=>x.id===t.actorId);
 if(!p||!alive(p))return;
 if(t.stage==='afterBowl'){
   play('breath',p.name+' holds the sick bowl and breathes carefully. They look pale, but they are not sick yet.','warn');
   addTimeline('sickBuildUp',p.id,'retch',3+r(5),{});
 }else if(t.stage==='retch'){
   play('outBreath',p.name+' retches over the sick bowl. They still need you nearby.','warn');
   addTimeline('sickBuildUp',p.id,'vomit',2+r(5),{});
 }else if(t.stage==='vomit'){
   play(rnd(['vomit1','vomit2','vomit3']),p.name+' is sick into the bowl. They may need tissues, water and reassurance now.','danger');
   p.needs.push('Tissues','Water Cup');
   p.comfort=Math.max(0,p.comfort-12);
   addConcern(p.name+' needs aftercare after being sick',p.id,'normal');
   addTimeline('sickBuildUp',p.id,'recover',4+r(6),{});
 }else if(t.stage==='recover'){
   play('breath',p.name+' is breathing shakily after being sick. They are calmer if you check on them.','warn');
 }
}
function processDrinkBuildUp(t){
 let p=G.patients.find(x=>x.id===t.actorId);
 if(!p||!alive(p))return;
 if(t.stage==='sip'){
   play('drink',p.name+' takes a few sips.','good');
   addTimeline('drinkBuildUp',p.id,'response',2+r(4),{});
 }else{
   let msg=p.thirst<35? p.name+' says the drink helped.' : p.name+' says they still feel thirsty.';
   play('ding',msg,'good');
 }
}
function processBlanketBuildUp(t){
 let p=G.patients.find(x=>x.id===t.actorId);
 if(!p||!alive(p))return;
 play('blanket',p.name+' settles under the blanket and seems a little more comfortable.','good');
}
function processStaffBreak(t){
 let s=G.staff.find(x=>x.id===t.actorId);
 if(!s)return;
 if(t.stage==='start'){
   s.busy=true;s.task='on break';s.loc='Cafeteria';
   play('tea',s.name+' has started their break.','good');
   addTimeline('staffBreak',s.id,'return',15+r(10),{});
 }else{
   s.busy=false;s.task='available';s.energy=Math.min(100,s.energy+35);s.hunger=Math.max(0,s.hunger-45);s.thirst=Math.max(0,s.thirst-45);s.morale=Math.min(100,s.morale+10);
   play('door',s.name+' has returned from break.','good');
 }
}
function processStaffTalk(t){
 let s=G.staff.find(x=>x.id===t.actorId);
 if(!s)return;
 s.loc=G.loc;
 let line=rnd([
   s.name+' comes to you and says: Doctor, can we talk? I have had a hard day today.',
   s.name+' says quietly: I know patients come first, but I am really struggling right now.',
   s.name+' asks: Can I have a minute? That last patient really affected me.',
   s.name+' says: I need to sit down for a moment. Is that okay?'
 ]);
 play('knock',line,'warn');
 openConversation('staff',s.id,line);
}
function processConversationNudge(t){
 let p=G.patients.find(x=>x.id===t.actorId);
 if(!p||!alive(p))return;
 p.room=t.data.room||p.room;
 let line=rnd([
   p.name+' says: Doctor? Sorry, could I talk to you?',
   p.name+' says: I know you are busy, but I am worried.',
   p.name+' says: I do not feel right. Could you check on me?',
   p.name+' says: Please do not forget me.'
 ]);
 play('callBell',line,'warn');
 openConversation('patient',p.id,line);
}
function openConversation(kind,id,line){
 G.activeConversations.unshift({id:gid(),kind,actorId:id,line,started:timeText(),resolved:false});
 if(G.activeConversations.length>20)G.activeConversations.pop();
 addLog('Conversation started: '+line,'warn');
 save();
}
function spontaneousConversations(){
 if(Math.random()<.004){
   let p=activePatient();
   if(p&&alive(p))addTimeline('conversationNudge',p.id,'start',0,{room:p.room});
 }
 if(Math.random()<.003){
   let s=G.staff.find(x=>!x.busy&&x.morale<70)||G.staff.find(x=>!x.busy&&Math.random()<.15);
   if(s)addTimeline('staffTalk',s.id,'start',0,{});
 }
}
function staffEmotionalMinute(){
 G.staff.forEach(s=>{
   if(s.busy)return;
   if(s.energy<30||s.hunger>70||s.thirst>70)s.morale=Math.max(0,s.morale-.03);
   if(s.morale<45&&Math.random()<.002)addTimeline('staffTalk',s.id,'start',0,{});
   if((s.energy<20||s.hunger>85||s.thirst>85)&&Math.random()<.002){
     s.loc=G.loc;
     let line=s.name+' comes to you and says: I need a break. Is that okay?';
     play('knock',line,'warn');
     openConversation('staff',s.id,line);
   }
 });
}
function conversationsView(){
 let open=G.activeConversations.filter(c=>!c.resolved);
 app.innerHTML='<div class="card"><h2>Open conversations</h2><p>These are people who started conversations with you on their own.</p><button onclick="placeView()">Back</button></div>'+
 (open.length?open.map(c=>{

 }).join(''):'<div class="card"><p>No one is waiting to talk right now.</p></div>');
}
function goConversation(cid){
 let c=G.activeConversations.find(x=>x.id===cid);
 if(!c)return;
 if(c.kind==='patient'){
   let p=G.patients.find(x=>x.id===c.actorId);
   if(p){moveTo(p.room);patientView(p.id);return}
 }else{
   let s=G.staff.find(x=>x.id===c.actorId);
   if(s){moveTo(s.loc);staffTalkView(s.id);return}
 }
}
function resolveConversation(cid){
 let c=G.activeConversations.find(x=>x.id===cid);
 if(c)c.resolved=true;
 save();conversationsView();
}

function daily(){Object.keys(G.stock).forEach(k=>G.stock[k]=Math.min(120,G.stock[k]+8+r(12)));G.weather=rnd(['Sunny','Rain','Heavy rain','Storm','Cold','Snow','Fog']);addLog('New day. Supplies arrived. Weather: '+G.weather+'.')}
function runRoutines(){
 let now=String(G.time.hour).padStart(2,'0')+':'+String(G.time.min).padStart(2,'0');
 ROUTINES.forEach(rt=>{
  let key=G.time.day+'-'+rt.time;
  if(now===rt.time&&!G.routineDone[key]){
    G.routineDone[key]=true;G.stats.routines++;routine(rt);
  }
 });
}
function routine(rt){
 if(rt.kind==='food'){
  play('trolley',rt.name+': the food trolley is moving through the wards. Patients may ask for food, drinks or help eating.','good');
  G.patients.filter(p=>alive(p)&&['Adult Ward Corridor',"Children's Ward Corridor",'Maternity Corridor','Recovery Ward'].includes(p.dept)).slice(0,14).forEach(p=>{if(Math.random()<.6)patientRequest(p,rnd(['Meal Tray','Water Cup','Juice Cup']))});
 }else if(rt.kind==='meds'){
  play('pill','Morning medication round: nurses are giving routine medicine and will call you if a prescription looks unsafe.','good');
  autoStaffHelp('medication round');
 }else if(rt.kind==='observations'){
  play('beep',rt.name+': nurses are checking observations across the wards.','good');
  G.patients.filter(alive).forEach(p=>{
   p.obs = makeObs(p);
   if(p.condition>78&&Math.random()<.35)patientRequest(p,'Senior Doctor');
  });
 }else if(rt.kind==='round'){
  play('paper','Doctor ward round: staff are expecting patient reviews on the wards.','good');
  G.patients.filter(p=>alive(p)&&p.condition>50).slice(0,14).forEach(p=>addConcern('Ward round review for '+p.name,p.id,p.condition>80?'urgent':'normal'));
 }else if(rt.kind==='handover'){
  play('paper','Staff handover: nurses update you about overnight concerns and new patients.','good');
  let p=activePatient();if(p)addConcern('Handover concern: review '+p.name+' in '+p.room,p.id,p.condition>75?'urgent':'normal');
 }else if(rt.kind==='scans'){
  play('phone','Scan and discharge review period: porters may move stable patients for imaging.','good');
  autoTransfers();
 }else if(rt.kind==='visits'){
  play('knock','Visiting time update: visitors are leaving soon, but ICU, children and end-of-life cases may have exceptions.','good');
  for(let i=0;i<3;i++)if(Math.random()<.6)visitorEvent();
 }else if(rt.kind==='night'){
  play('ding','Night settling round: lights are dimmed, blankets and pain relief requests may increase.','good');
  G.patients.filter(alive).slice(0,10).forEach(p=>{if(Math.random()<.4)patientRequest(p,rnd(['Blanket','Water Cup','Tissues']))});
 }
}
function patientMinute(){
 G.patients.forEach(p=>{
  if(!alive(p))return;
  p.thirst=Math.min(100,p.thirst+.08);
  p.hunger=Math.min(100,p.hunger+.035);
  p.comfort=Math.max(0,p.comfort-.04);
  p.minutes++;
  if(p.pregnant)p.labour=Math.min(100,p.labour+.06);
  let deteriorationRate = G.settings.difficulty==='challenging' ? p.severity/72000 : p.severity/95000;
  if(!p.treatmentStarted&&Math.random()<deteriorationRate)p.condition=Math.min(100,p.condition+1);
  if(p.thirst>75&&!p.needs.includes('Water Cup'))patientRequest(p,'Water Cup');
  if(p.comfort<25&&!p.needs.includes('Blanket')&&Math.random()<.006)patientRequest(p,'Blanket');
  if(p.symptoms.includes('vomiting')&&Math.random()<.004&&!p.needs.includes('Sick Bowl'))patientRequest(p,'Sick Bowl');
  if(p.pregnant&&p.labour>90&&!p.needs.includes('Midwife'))patientRequest(p,'Midwife');
  if(p.condition>83&&!p.warned){p.warned=true;G.stats.emergencies++;addConcern('Urgent review for '+p.name,p.id,'urgent');play('callBell','Call bell: '+p.name+' in '+p.room+' needs urgent review because their condition is worsening.')}
  if(p.condition>91&&WORLD[p.room]&&WORLD[p.room].kind==='critical'&&Math.random()<.0025)play('alarm','Monitor alarm: '+p.name+' in '+p.room+' is deteriorating. Symptoms: '+p.symptoms.join(', ')+'.','danger');
  if(p.condition>96&&Math.random()<.001)death(p,'became critically unwell');
 });
}
function staffMinute(){
 G.staff.forEach(s=>{
  s.hunger=Math.min(100,s.hunger+.025);

}

 else if(q.includes('scared')||q.includes('worried')||q.includes('explain')){ans='Thank you for explaining. That helps me feel safer.';p.memory.reassured++}
 else ans=p.memory.helped>0?'Thank you for coming back. '+rnd(p.speech||['I still feel unwell.']):rnd(p.speech||['I feel unwell.']);
 document.getElementById('reply').textContent=p.name+': '+ans;speak(ans);p.lastSpoken=ans;addLog('You spoke with '+p.name+'.');

function useHeldWithPatient(pid){
 let p=G.patients.find(x=>x.id===pid);if(!G.held){play('beep','You are not holding anything.');return}
 let item=G.held;
 let helps=['Water Cup','Juice Cup','Tea Cup','Coffee Cup','Meal Tray','Sandwich','Toast','Crackers','Snack','Tissues','Blanket','Pillow','Towel','Sick Bowl','Sick Bag','Phone Charger','Bottle','Formula','Baby Blanket','Nappies','Baby Wipes','Wet Wipes','Book','Magazine','Earplugs','Eye Mask','Oxygen','Inhaler','IV Fluids','Antibiotics','Anti-Sickness','Emergency Medication','Reassurance','Midwife','Senior Doctor','Crash Trolley','Pain Relief','Bandage','Food'];
 if(!helps.includes(item)){play('beep',plainItem(item)+' is not something you can give directly to the patient.');return}
 G.held=null;p.needs=p.needs.filter(n=>n!==item&&plainItem(n)!==plainItem(item));p.completed.push(item);p.comfort=Math.min(100,p.comfort+12);p.memory.helped++;G.stats.comforts++;
 if(['Water Cup','Juice Cup','Tea Cup','Coffee Cup'].includes(item)){p.thirst=Math.max(0,p.thirst-42);addTimeline('drinkBuildUp',p.id,'sip',1+r(3),{});}
 if(['Meal Tray','Sandwich','Toast','Crackers','Snack','Food'].includes(item))p.hunger=Math.max(0,p.hunger-42);
 if(item==='Blanket')addTimeline('blanketBuildUp',p.id,'settle',2+r(4),{});
 if(item==='Sick Bowl'||item==='Sick Bag'){p.condition=Math.max(1,p.condition-2);addTimeline('sickBuildUp',p.id,'afterBowl',2+r(4),{});}
 if(p.treat.includes(item)){p.condition=Math.max(2,p.condition-10);p.treatmentStarted=true}
 if(item==='Midwife'&&p.pregnant&&p.labour>85){deliverBaby(p)}
 if(item==='Crash Trolley'){p.condition=Math.max(15,p.condition-15);G.stats.emergencies++}
 if(item==='Senior Doctor'){p.diagnosed=true;p.condition=Math.max(5,p.condition-8)}
 if(item==='Sick Bowl'||item==='Sick Bag')play(ITEM_SOUND[item]||'ding','You gave '+plainItem(item)+' to '+p.name+'. They hold it close, but nothing happens immediately.');
 else play(ITEM_SOUND[item]||'ding','You gave '+plainItem(item)+' to '+p.name+'.');
 note(p,'Given '+plainItem(item)+'.');
 if(p.condition<35&&p.treatmentStarted)play('bell',p.name+' is improving and may soon be ready for discharge.','good');
 patientView(pid);
}
function examineWithHeld(pid){

 if(item==='Thermometer'){let val=p.symptoms.includes('fever')?(38+Math.random()*2).toFixed(1)+' degrees C':'36.8 degrees C';play('beep','Temperature for '+p.name+': '+val+'.');note(p,'Temperature: '+val+'.');p.obs.temp=val;G.stats.exams++}
 else if(item==='Pulse Oximeter'){let val=p.symptoms.some(s=>s.includes('breath')||s.includes('wheez'))?(88+r(8))+' percent':(96+r(3))+' percent';play('beep','Oxygen level for '+p.name+': '+val+'.');note(p,'Oxygen: '+val+'.');p.obs.oxygen=val;G.stats.exams++}
 else if(item==='Blood Pressure Machine'){let val=rnd(['120 over 80','140 over 90','95 over 60','160 over 100']);play('beep','Blood pressure for '+p.name+': '+val+'.');note(p,'Blood pressure: '+val+'.');p.obs.bp=val;G.stats.exams++}
 else if(item==='Blood Glucose Monitor'){let val=rnd(['normal','low','high']);play('beep','Blood sugar for '+p.name+': '+val+'.');note(p,'Blood sugar: '+val+'.');G.stats.exams++}
 else if(item==='Stethoscope'){play(p.symptoms.some(s=>s.includes('wheez'))?'wheezy':'breath','You listened to '+p.name+' with the stethoscope.');note(p,'Chest listened to. Findings match '+p.symptoms.join(', ')+'.');G.stats.exams++}

 else{play('beep',plainItem(item)+' is not examination equipment.');return}

async function handleStaffSpeech(id){
 let s=G.staff.find(x=>x.id===id);
 if(!s)return;
 let q=(document.getElementById('staffSpeech').value||'').toLowerCase().trim();
 let original=(document.getElementById('staffSpeech').value||'').trim();
 if(!q){play('beep','Type what you want to say first.');return}
 let patient=G.patients.find(p=>alive(p)&&(q.includes(p.name.toLowerCase())||q.includes(p.name.toLowerCase().split(' ')[0])));
 let room=Object.keys(WORLD).find(room=>q.includes(room.toLowerCase()));
 if(!room&&patient)room=patient.room;
 let wantsMidwife=q.includes('midwife')||q.includes('labour')||q.includes('birth')||q.includes('baby');
 let wantsNurse=q.includes('nurse')||q.includes('check')||q.includes('observations')||q.includes('obs')||q.includes('call bell');
 let wantsDoctor=q.includes('doctor')||q.includes('review')||q.includes('worse')||q.includes('deteriorating')||q.includes('urgent');
 let wantsPorter=q.includes('porter')||q.includes('move')||q.includes('transfer')||q.includes('trolley');
 let wantsDrink=q.includes('water')||q.includes('drink')||q.includes('tea')||q.includes('juice');
 let wantsBlanket=q.includes('blanket')||q.includes('cold');
 let emotional=q.includes('hard day')||q.includes('talk')||q.includes('upset')||q.includes('break')||q.includes('tired')||q.includes('stress')||q.includes('cry')||q.includes('are you ok');
 let role=s.role.toLowerCase();
 let canHelp=false;
 if(wantsMidwife)canHelp=role.includes('midwife')||role.includes('nurse')||role.includes('senior doctor');
 else if(wantsPorter)canHelp=role.includes('porter')||role.includes('healthcare')||role.includes('nurse');
 else if(wantsDoctor)canHelp=role.includes('doctor')||role.includes('nurse');
 else if(wantsNurse||wantsDrink||wantsBlanket)canHelp=role.includes('nurse')||role.includes('healthcare')||role.includes('midwife');
 else canHelp=true;
 let reply='';
 if(room&&canHelp){
   s.loc=room;
   s.busy=true;
   s.task='helping in '+room;
   if(patient){
     if(wantsMidwife){
       patient.needs=patient.needs.filter(n=>n!=='Midwife');
       patient.completed.push('Midwife');
       patient.comfort=Math.min(100,patient.comfort+12);
       if(patient.pregnant&&patient.labour>85)deliverBaby(patient);
     }
     if(wantsDrink){
       patient.needs=patient.needs.filter(n=>n!=='Water Cup');
       patient.thirst=Math.max(0,patient.thirst-35);
       patient.comfort=Math.min(100,patient.comfort+8);
     }
     if(wantsBlanket){
       patient.needs=patient.needs.filter(n=>n!=='Blanket');
       patient.comfort=Math.min(100,patient.comfort+12);
     }
     if(wantsDoctor||wantsNurse){
       patient.obs=makeObs(patient);
       patient.condition=Math.max(1,patient.condition-4);
       note(patient,s.name+' reviewed after you asked for help.');
     }
   }
   G.stats.staffHelped++;
   if(G.settings.localAI&&!G.settings.aiLoaded&&!G.settings.aiLoading){await loadLocalAI();}
   reply=aiAvailable()?await generateLocalReply('staff',s,original,{patient,room}):null;
   if(!reply)reply=s.name+' says: Yes doctor, I am going to '+room+' now.';
   play('footsteps',reply,'good');
   setTimeout(()=>{s.busy=false;s.task='available';addLog(s.name+' finished helping in '+room+'.','good');save();},5000);
 }else if(emotional){
   if(q.includes('break')){
     s.energy=Math.min(100,s.energy+25);
     s.hunger=Math.max(0,s.hunger-20);
     s.thirst=Math.max(0,s.thirst-20);
     s.morale=Math.min(100,s.morale+10);
     s.busy=true;
     s.task='taking a needed break';
     addTimeline('staffBreak',s.id,'start',1,{});
   }else{
     s.morale=Math.min(100,s.morale+8);
     s.relationships++;
   }
   if(G.settings.localAI&&!G.settings.aiLoaded&&!G.settings.aiLoading){await loadLocalAI();}
   reply=aiAvailable()?await generateLocalReply('staff',s,original,{}):null;
   if(!reply)reply=s.name+' says: Thank you for listening. I needed someone to treat me like a person for a minute.';
   play(q.includes('break')?'tea':'ding',reply,'good');
 }else if(room&&!canHelp){
   reply=s.name+' says: I can go there, but I am not the right person for that. You may need a midwife, nurse, doctor, or porter.';
   play('phone',reply,'warn');
 }else{
   if(G.settings.localAI&&!G.settings.aiLoaded&&!G.settings.aiLoading){await loadLocalAI();}
   reply=aiAvailable()?await generateLocalReply('staff',s,original,{}):null;
   if(!reply)reply=s.name+' says: Tell me which patient or room you need me to go to.';
   play('beep',reply,'warn');
 }
 let out=document.getElementById('staffReply'); if(out)out.textContent=reply;
 s.relationships++;
 addLog('You said to '+s.name+': '+q);
 save();
}

function runCommand(){
 let q=(document.getElementById('commandBox').value||'').toLowerCase().trim();
 if(!q){play('beep','Type a command first.');return}
 let places=Object.keys(WORLD);
 let place=places.find(p=>q.includes(p.toLowerCase()));
 if((q.startsWith('go')||q.includes('go to')||q.includes('walk to')||q.includes('move to'))&&place){moveTo(place);return}
 let obj=(WORLD[G.loc].objects||[]).find(o=>q.includes(o.toLowerCase()));
 if((q.includes('open')||q.includes('touch')||q.includes('check')||q.includes('use'))&&obj){touchObject(obj);return}
 let patient=G.patients.find(p=>alive(p)&&q.includes(p.name.toLowerCase().split(' ')[0]));
 if(patient&&q.includes('ask')){patientView(patient.id);return}
 let staff=G.staff.find(s=>q.includes(s.name.toLowerCase())||q.includes(s.name.toLowerCase().split(' ')[0]));
 if(staff&&(q.includes('tell')||q.includes('ask')||q.includes('need')||q.includes('needs')||q.includes('go to')||q.includes('come'))){quickStaffCommand(staff,q);return}
 if(q.includes('midwife')||q.includes('nurse')||q.includes('porter')||q.includes('doctor')){
   let likely=G.staff.find(s=>(q.includes('midwife')&&s.role.includes('midwife'))||(q.includes('porter')&&s.role.includes('porter'))||(q.includes('doctor')&&s.role.includes('doctor'))||(q.includes('nurse')&&s.role.includes('nurse')));
   if(likely){quickStaffCommand(likely,q);return}
 }
 if(q.includes('bag')){bagView();return}
 if(q.includes('routines')){routineView();return}
 if(q.includes('board')||q.includes('concern')){informationView();return}
 if(q.includes('wait')||q.includes('stand')){tick(30);placeView();return}
 play('beep','I could not understand that command yet. Try go to supply room, open cup shelf, tell midwife Sarah labour room 1 needs you, check board, or interact with a patient.');
}

}
