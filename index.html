function checkAch(name,ok){if(ok&&!G.achievements.includes(name)){G.achievements.push(name);log('Achievement unlocked: '+name+'.','good');play('bell')}}
function startGame(){G.started=true;for(let i=0;i<65;i++)makePatient(false);for(let i=0;i<8;i++)makePatient(true);log('You started your first day as a hospital doctor. The hospital is now running.');save();render()}
function status(){document.getElementById('status').textContent=G.started?timeText()+' | '+G.weather+' | '+G.loc.floor+', '+G.loc.room+' | reputation '+G.reputation+'% | active patients '+G.patients.filter(p=>p.status!=='Discharged'&&p.status!=='Dead').length:'Not started'}
function render(){status();let app=document.getElementById('app');if(!G.started){app.innerHTML='<div class="card"><h2>One persistent hospital</h2><p>You are a hospital doctor. There are no separate modes. The hospital runs forever, your career grows inside the same save, and everything saves automatically.</p><button onclick="startGame()">Start First Day</button></div><div class="card"><button onclick="audioOn=!audioOn;render()">Sound: '+(audioOn?'On':'Off')+'</button><button onclick="G.settings.voice=!G.settings.voice;save();render()">Voice: '+(G.settings.voice?'On':'Off')+'</button></div>';return}app.innerHTML=home()}
function home(){return '<div class="card"><h2>Main</h2><div class="row"><button onclick="mapView()">Move Around Hospital</button><button onclick="patientsView()">Patients</button><button onclick="tasksView()">Task Board</button><button onclick="inventoryView()">Inventory and Stock</button><button onclick="staffView()">Colleagues</button><button onclick="visitorView()">Visitors</button><button onclick="statsView()">Career</button><button onclick="settingsView()">Settings</button><button onclick="tick(15);log(\'Fifteen minutes passed.\');render()">Let Time Pass</button></div></div><div class="card card2"><h2>'+G.loc.room+'</h2><p class="small">'+roomInfo(G.loc.room)+'</p><div class="grid">'+(ROOM_OBJECTS[G.loc.room]||['Main area']).map(o=>'<button onclick="objectAction(\''+esc(o)+'\')">'+o+'</button>').join('')+'</div></div><div class="card"><h2>Patients in or linked to this area</h2>'+nearPatients().slice(0,10).map(patientCard).join('')+'</div><div class="card"><h2>Recent hospital log</h2><div class="log">'+G.log.slice(0,30).map(l=>'<div class="'+(l.type==='danger'?'dangerText':l.type==='warn'?'warnText':l.type==='good'?'goodText':'')+'">'+l.at+': '+l.t+'</div>').join('')+'</div></div>'}
function roomInfo(rm){let m={'Reception':'Check messages, phones and new arrivals.','Waiting Room':'Walk-in patients wait here; some can worsen while waiting.','A&E':'Emergency assessment, triage, resus and ambulance handovers.','Adult Ward':'Ongoing adult care, comfort requests, ward rounds and discharges.',"Children's Ward":'Children, parents, toys, procedures and reassurance.','ICU':'Critical patients, monitors, alarms and family conversations.','Maternity Ward':'Pregnancy, labour, newborns and postnatal care.','Operating Theatres':'Surgery, theatre preparation and emergency procedures.','Recovery Ward':'Patients waking after operations.','Supply Room':'Comfort items, food, drinks, sick bowls and sick bags.','Equipment Room':'Thermometers, stethoscopes, oximeters and other tools.','Laboratory':'Samples, test results and urgent calls.','Pharmacy':'Medication, allergy warnings and pharmacist advice.','Imaging Department':'X-ray, CT, MRI and ultrasound.','Mortuary':'Respectful care after death and quiet family support.'};return m[rm]||'Explore objects and respond to what the hospital needs.'}
function esc(s){return String(s).replace(/'/g,"\\'")}
function nearPatients(){let room=G.loc.room;if(room==="Nurses' Station")return G.patients.filter(p=>p.status!=='Dead'&&p.status!=='Discharged');return G.patients.filter(p=>p.status!=='Dead'&&p.status!=='Discharged'&&(p.dept===room||room==='A&E'&&p.dept==='A&E'||room==='Waiting Room'&&p.status==='Waiting'||room==='Ambulance Bay'&&p.dept==='A&E'||room==='Operating Theatres'&&p.status==='In surgery'||room==='Recovery Ward'&&p.status==='Recovery'||room==='Mortuary'&&p.status==='Dead'))}
function patientCard(p){let cls=p.condition>85?'critical':p.condition>60?'urgent':'stable';return '<div class="card patient '+cls+'"><h3>'+p.name+', age '+p.age+'</h3><p>Status: '+p.status+'. Location: '+p.dept+', '+p.room+'. Condition '+p.condition+'/100. Pain '+p.pain+'/10.</p><p>Symptoms: '+p.symptoms.join(', ')+'.</p><p>Needs: '+(p.needs.length?p.needs.join(', '):'none')+'. Allergy: '+p.allergy+'.</p><div class="row"><button onclick="patientView(\''+p.id+'\')">Open Patient</button><button onclick="listenPatient(\''+p.id+'\')">Listen</button></div></div>'}
function mapView(){play('footsteps');let h='<div class="card"><h2>Hospital Map</h2><p>Choose a floor.</p><div class="grid">';Object.keys(FLOORS).forEach(f=>h+='<button onclick="floorView(\''+esc(f)+'\')">'+f+'</button>');h+='</div><button onclick="render()">Back</button></div>';app.innerHTML=h}
function floorView(f){G.loc.floor=f;let h='<div class="card"><h2>'+f+'</h2><div class="grid">';FLOORS[f].forEach(r=>h+='<button onclick="goRoom(\''+esc(r)+'\')">'+r+'</button>');h+='</div><button onclick="mapView()">Back to floors</button></div>';app.innerHTML=h}
function goRoom(rm){G.loc.room=rm;play(rm==='Lift'?'ding':'door');tick(2);say('You are in '+rm);render()}
function objectAction(o){tick(2);let low=o.toLowerCase();if(low.includes('phone')){play('phone');log('You checked the phone in '+G.loc.room+'.');if(Math.random()<.4)event()}else if(low.includes('computer')||low.includes('board')||low.includes('folder')){play('keyboard');log('You reviewed information at '+G.loc.room+'.');tasksView();return}else if(low.includes('printer')||low.includes('forms')||low.includes('notes')){play('paper');log('You handled paperwork.')}else if(low.includes('water')||low.includes('drinks'))take('Water','waterPour');else if(low.includes('food')||low.includes('serving'))take('Food','eating');else if(low.includes('tissue'))take('Tissues','paper2');else if(low.includes('blanket'))take('Blanket','blanket');else if(low.includes('towel'))take('Towel','paper2');else if(low.includes('sick bowl'))take('Sick Bowl','ding');else if(low.includes('sick bag'))take('Sick Bag','bag');else if(low.includes('thermometer'))take('Thermometer','beep');else if(low.includes('stethoscope'))take('Stethoscope','ding');else if(low.includes('pulse'))take('Pulse Oximeter','beep');else if(low.includes('blood pressure'))take('Blood Pressure Machine','beep');else if(low.includes('glucose'))take('Blood Glucose Monitor','beep');else if(low.includes('torch'))take('Medical Torch','ding');else if(low.includes('wheelchair'))take('Wheelchair','trolley');else if(low.includes('trolley')||low.includes('cart')){play('trolley');log('You moved a trolley.')}else if(low.includes('crash')){play('trolley');log('Crash trolley ready.')}else if(low.includes('defib')){play('defib');log('Defibrillator checked.')}else if(low.includes('shower')){play('shower');log('You checked the shower room.')}else if(low.includes('toilet')){play('toilet');log('You checked the toilet area.')}else if(low.includes('vending')){play('beep');take('Snack','beep')}else if(low.includes('fridge')){play('fridgeOpen');log('You checked the fridge.')}else if(low.includes('medication')||low.includes('pharmacy')||low.includes('shelves')){play('pill');take('Medication Basket','pill')}else if(low.includes('sample')){take('Sample Pot','ding')}else if(low.includes('baby')){play('baby');log('You checked the baby care area.')}else if(low.includes('theatre')){play('monitor');log('You checked theatre readiness.')}else{play('ding');log('You interacted with '+o+'.')}render()}
function take(item,snd){if(G.inventory[item]==null)G.inventory[item]=0;if(G.stock[item]!=null){if(G.stock[item]<=0){log(item+' is out of stock.','warn');play('beep');return}G.stock[item]--}G.inventory[item]++;play(snd||'ding');log('You picked up '+item+'.')}
function patientsView(){let arr=G.patients.filter(p=>p.status!=='Discharged').sort((a,b)=>b.condition-a.condition);app.innerHTML='<div class="card"><h2>Patients</h2><button onclick="makePatient(false);render()">Add Walk-In</button><button onclick="makePatient(true);render()">Add Ambulance</button><button onclick="render()">Back</button></div>'+arr.map(patientCard).join('')}
function patientView(pid){let p=G.patients.find(x=>x.id===pid);if(!p)return;listenPatient(pid);let actions=['Talk','Give Water','Give Juice','Give Tea','Give Food','Give Tissues','Give Blanket','Give Towel','Give Sick Bowl','Give Sick Bag','Give Phone Charger','Take Temperature','Check Oxygen','Check Blood Pressure','Check Blood Sugar','Listen to Chest','Check Pain','Order Blood Test','Order Urine Test','Order X-Ray','Order CT Scan','Order MRI Scan','Order Ultrasound','Send Sample to Lab','Give Pain Relief','Give Antibiotics','Give Anti-Sickness','Give Inhaler','Give Oxygen','Give IV Fluids','Call Nurse','Call Senior Doctor','Call Pharmacist','Call Porter','Request Surgery','Move to ICU','Move to Adult Ward','Move to Children\'s Ward','Move to Recovery','Deliver Baby','Discharge Patient','Support Family','Write Notes'];app.innerHTML='<div class="card"><h2>'+p.name+'</h2><p>Age '+p.age+'. '+p.dept+', '+p.room+'. Status '+p.status+'. Condition '+p.condition+'/100. Pain '+p.pain+'/10.</p><p>Symptoms: '+p.symptoms.join(', ')+'.</p><p>Needs: '+(p.needs.length?p.needs.join(', '):'none')+'. Allergy: '+p.allergy+'. Family: '+p.family+'.</p><p>Known diagnosis for game logic: '+p.illness+'. '+(p.diagnosed?'You have diagnosed this.':'You have not confirmed the diagnosis yet.')+'</p></div><div class="card"><h3>Talk to patient</h3><textarea id="talk" placeholder="Type what you want to ask or say."></textarea><button onclick="talk(\''+p.id+'\')">Speak</button><p id="reply"></p></div><div class="card"><h3>Hands-on actions</h3><div class="grid">'+actions.filter(a=>!(a==='Deliver Baby'&&!p.pregnant)).map(a=>'<button onclick="doAction(\''+p.id+'\',\''+esc(a)+'\')">'+a+'</button>').join('')+'</div></div><div class="card"><h3>Notes</h3>'+(p.notes.length?p.notes.map(n=>'<p>'+n+'</p>').join(''):'<p>No notes yet.</p>')+'<button onclick="patientsView()">Back to Patients</button><button onclick="render()">Back to Room</button></div>'}
function listenPatient(pid){let p=G.patients.find(x=>x.id===pid);if(!p)return;let s=p.sounds.length?rnd(p.sounds):'breath';play(s)}
function talk(pid){let p=G.patients.find(x=>x.id===pid);let q=document.getElementById('talk').value.toLowerCase();tick(3);play('paper');let ans='';if(q.includes('pain'))ans='The pain is '+p.pain+' out of 10. '+(p.pain>6?'It is hard to cope with.':'It is manageable right now.');else if(q.includes('when')||q.includes('start'))ans='It started '+rnd(['this morning','last night','a few hours ago','yesterday','about two days ago'])+'.';else if(q.includes('breath')||q.includes('chest'))ans=p.symptoms.some(s=>s.includes('breath')||s.includes('chest')||s.includes('wheez'))?'My breathing feels difficult and my chest feels uncomfortable.':'My breathing is okay right now.';else if(q.includes('sick')||q.includes('vomit'))ans=p.symptoms.includes('vomiting')||p.symptoms.includes('feeling sick')?'I feel sick and I might need a sick bowl or bag.':'I do not feel sick right now.';else if(q.includes('allerg'))ans='My recorded allergy is '+p.allergy+'.';else if(q.includes('family'))ans='Family information: '+p.family+'.';else if(q.includes('water')||q.includes('drink'))ans='Yes please, I would like something to drink if I am allowed.';else if(q.includes('scared')||q.includes('worry'))ans='I am worried. Please explain what is happening.';else ans='The main things are '+p.symptoms.join(', ')+'. I feel '+(p.condition>75?'really unwell':'unwell')+'.';document.getElementById('reply').textContent=p.name+': '+ans;say(ans);log('You spoke with '+p.name+'.')}
function doAction(pid,a){let p=G.patients.find(x=>x.id===pid);if(!p)return;tick(5);let give={'Give Water':'Water','Give Juice':'Juice','Give Tea':'Tea','Give Food':'Food','Give Tissues':'Tissues','Give Blanket':'Blanket','Give Towel':'Towel','Give Sick Bowl':'Sick Bowl','Give Sick Bag':'Sick Bag','Give Phone Charger':'Phone Charger'};if(give[a]){useItem(p,give[a])}else if(a==='Take Temperature'){need('Thermometer',()=>result(p,'Temperature',p.symptoms.includes('fever')?(38+Math.random()*2).toFixed(1)+' degrees C':'36.8 degrees C','beep'))}else if(a==='Check Oxygen'){need('Pulse Oximeter',()=>result(p,'Oxygen',p.symptoms.some(s=>s.includes('breath')||s.includes('wheez'))?(88+r(8))+' percent':(96+r(3))+' percent','beep'))}else if(a==='Check Blood Pressure'){need('Blood Pressure Machine',()=>result(p,'Blood pressure',rnd(['120 over 80','140 over 90','95 over 60','160 over 100']),'beep'))}else if(a==='Check Blood Sugar'){need('Blood Glucose Monitor',()=>result(p,'Blood sugar',rnd(['normal','low','high']),'beep'))}else if(a==='Listen to Chest'){need('Stethoscope',()=>{play(p.symptoms.some(s=>s.includes('wheez'))?'wheezy':'breath');note(p,'Chest listened to. Symptoms considered: '+p.symptoms.join(', '));})}else if(a==='Check Pain'){note(p,'Pain score checked: '+p.pain+'/10.')}else if(a.startsWith('Order')){orderTest(p,a.replace('Order ',''))}else if(a==='Send Sample to Lab'){need('Sample Pot',()=>{play('trolley');G.results.push({patient:p.name,text:'sample result supports '+p.illness});note(p,'Sample sent to lab.');})}else if(a.startsWith('Give ')){treat(p,a.replace('Give ',''))}else if(a.startsWith('Call ')){callSomeone(p,a.replace('Call ',''))}else if(a==='Request Surgery'){p.status='In surgery';p.dept='Operating Theatres';G.stats.surgeries++;p.condition=Math.max(20,p.condition-18);note(p,'Surgery requested and patient transferred to theatre.');play('trolley');checkAch('First surgery',true)}else if(a.startsWith('Move to ')){let d=a.replace('Move to ','');p.dept=d;p.status='Admitted';note(p,'Transferred to '+d+'.');play('trolley');if(d==='ICU')checkAch('First ICU transfer',true)}else if(a==='Deliver Baby'){deliverBaby(p)}else if(a==='Discharge Patient'){if(p.condition<45&&p.needs.length<2){p.status='Discharged';G.stats.discharged++;G.stats.treated++;G.reputation=Math.min(100,G.reputation+1);log(p.name+' was discharged safely.','good');checkAch('First discharge',true);checkAch('100 patients treated',G.stats.treated>=100)}else log(p.name+' is not ready for discharge.','warn')}else if(a==='Support Family'){play('cry');G.reputation=Math.min(100,G.reputation+1);G.player.morale=Math.max(0,G.player.morale-1);note(p,'Family was supported and updated.')}else if(a==='Write Notes'){play('paper');note(p,'Doctor note added at '+timeText()+'.')}save();patientView(pid)}
function useItem(p,item){if((G.inventory[item]||0)<=0){log('You need to collect '+item+' first.','warn');play('beep');return}G.inventory[item]--;p.needs=p.needs.filter(n=>n!==item);p.comfort=Math.min(100,p.comfort+12);if(['Water','Juice','Tea'].includes(item))p.thirst=Math.max(0,p.thirst-35);if(item==='Food')p.hunger=Math.max(0,p.hunger-35);play(item==='Water'?'drink':item==='Tea'?'tea':item==='Food'?'eating':item==='Sick Bag'?'bag':item==='Blanket'?'blanket':'ding');note(p,'Given '+item+'.')}
function need(item,cb){if((G.inventory[item]||0)<=0){log('You need '+item+' from the Equipment Room first.','warn');play('beep');return}cb()}
function result(p,name,val,snd){play(snd||'ding');note(p,name+': '+val+'.')}
function note(p,t){p.notes.unshift(timeText()+': '+t);log(p.name+': '+t)}
function orderTest(p,t){play('keyboard');note(p,t+' requested.');G.results.push({patient:p.name,text:t+' result: findings are consistent with '+p.illness});setTimeout(()=>{log(t+' result available for '+p.name+'.','good');play('phone');save()},2500+r(2500))}
function treat(p,t){play(t.includes('Medication')||t.includes('Antibiotic')||t.includes('Pain')||t.includes('Anti')?'pill':t==='Oxygen'?'breath':'ding');if(p.allergy==='Penicillin'&&t==='Antibiotics'){p.condition=Math.min(100,p.condition+8);G.reputation=Math.max(0,G.reputation-3);note(p,'Allergy warning: antibiotic choice needs review.');return}p.treatmentStarted=true;p.condition=Math.max(4,p.condition-(10+r(10)));p.comfort=Math.min(100,p.comfort+8);if(p.treatments.some(x=>x.toLowerCase().includes(t.toLowerCase().split(' ')[0])))p.diagnosed=true;note(p,t+' given. Patient condition improved.');checkAch('First patient treated',true);checkAch('Reputation over 90',G.reputation>=90)}
function callSomeone(p,who){play('phone');note(p,who+' contacted.');if(who==='Senior Doctor'){p.condition=Math.max(5,p.condition-8);p.diagnosed=true;log('Dr Patel gave advice about '+p.name+'.')}if(who==='Nurse'){addTask('Nurse assisting '+p.name,p.dept,p.id,'normal')}if(who==='Porter'){p.status='Awaiting transport';addTask('Porter transport for '+p.name,p.dept,p.id,'normal')}if(who==='Pharmacist')log('Pharmacist reviewed medication safety for '+p.name+'.')}
function deliverBaby(p){if(!p.pregnant){log('This patient is not in labour.','warn');return}if(!p.labourBirthReady&&p.labour<75){log(p.name+' is not ready to deliver yet.','warn');return}play('baby');G.stats.births++;p.pregnant=false;p.labour=0;p.condition=Math.max(15,p.condition-20);let baby=makePatient(false,'newborn check');baby.dept='Maternity Ward';baby.status='Admitted';note(p,'Baby delivered safely. Newborn admitted for checks.');log('A baby was born safely in Maternity.','good');checkAch('First birth',true)}
function tasksView(){let open=G.tasks.filter(t=>!t.done);app.innerHTML='<div class="card"><h2>Task Board</h2><button onclick="render()">Back</button></div>'+(open.length?open.map(t=>'<div class="card '+(t.priority==='urgent'?'critical':'')+'"><h3>'+t.text+'</h3><p>Department: '+t.dept+'. Created: '+t.created+'. Priority: '+t.priority+'.</p><button onclick="finishTask(\''+t.id+'\')">Mark Done</button><button onclick="delegateTask(\''+t.id+'\')">Delegate to colleague</button></div>').join(''):'<div class="card"><p>No open tasks.</p></div>')}
function finishTask(tid){let t=G.tasks.find(x=>x.id===tid);if(t){t.done=true;log('Task completed: '+t.text+'.','good');G.reputation=Math.min(100,G.reputation+.3)}save();tasksView()}
function delegateTask(tid){let t=G.tasks.find(x=>x.id===tid);let s=G.staff.find(x=>!x.busy&&x.energy>15)||rnd(G.staff);if(t&&s){s.busy=true;s.task=t.text;log(s.name+' is handling: '+t.text+'.');setTimeout(()=>{t.done=true;s.busy=false;s.task='available';s.energy=Math.max(0,s.energy-8);log(s.name+' completed delegated task: '+t.text+'.','good');save();render()},3500);play('phone')}save();tasksView()}
function inventoryView(){let inv=Object.keys(G.inventory).sort().map(k=>'<span class="tag">'+k+': '+G.inventory[k]+'</span>').join('');let st=Object.keys(G.stock).sort().map(k=>'<span class="tag">'+k+': '+G.stock[k]+'</span>').join('');app.innerHTML='<div class="card"><h2>Your carried items</h2>'+inv+'</div><div class="card"><h2>Hospital stock</h2>'+st+'</div><div class="card"><button onclick="render()">Back</button></div>'}
function staffView(){app.innerHTML='<div class="card"><h2>Colleagues</h2><button onclick="render()">Back</button></div>'+G.staff.map((s,i)=>'<div class="card"><h3>'+s.name+'</h3><p>'+s.role+'. Energy '+Math.round(s.energy)+'. Hunger '+Math.round(s.hunger)+'. Thirst '+Math.round(s.thirst)+'. Morale '+Math.round(s.morale)+'. Task: '+s.task+'.</p><button onclick="staffHelp('+i+',\'observations\')">Ask to take observations</button><button onclick="staffHelp('+i+',\'comfort requests\')">Ask to handle comfort requests</button><button onclick="staffHelp('+i+',\'transport\')">Ask to transport patient</button><button onclick="staffBreak('+i+')">Send on break</button></div>').join('')}
function staffHelp(i,task){let s=G.staff[i];play('phone');s.energy=Math.max(0,s.energy-7);s.thirst+=5;s.task=task;log(s.name+' is helping with '+task+'.');tick(8);save();staffView()}
function staffBreak(i){let s=G.staff[i];play('tea');s.energy=Math.min(100,s.energy+22);s.hunger=Math.max(0,s.hunger-35);s.thirst=Math.max(0,s.thirst-35);s.morale=Math.min(100,s.morale+4);s.task='on break';log(s.name+' took a break.');tick(10);save();staffView()}
function visitorView(){app.innerHTML='<div class="card"><h2>Visitors</h2><button onclick="render()">Back</button></div>'+(G.visitors.length?G.visitors.map(v=>'<div class="card"><h3>'+v.name+'</h3><p>Mood: '+v.mood+'. Needs: '+v.need+'.</p><button onclick="helpVisitor(\''+v.id+'\')">Help visitor</button></div>').join(''):'<div class="card"><p>No visitors currently need you.</p></div>')}
function helpVisitor(idv){let v=G.visitors.find(x=>x.id===idv);if(!v)return;play(v.need==='drink'?'drink':'ding');G.reputation+=v.mood==='angry'?.2:.5;log('You helped visitor '+v.name+' with '+v.need+'.','good');G.visitors=G.visitors.filter(x=>x.id!==idv);save();visitorView()}
function statsView(){let s=G.stats;let ach=ACH.map(a=>'<p>'+a+': '+(G.achievements.includes(a)?'unlocked':'locked')+'</p>').join('');app.innerHTML='<div class="card"><h2>Career</h2><p class="bigNum">Reputation: '+Math.round(G.reputation)+'%</p><p>Days worked: '+G.time.day+'</p><p>Patients treated: '+s.treated+'</p><p>Discharged: '+s.discharged+'</p><p>Births: '+s.births+'</p><p>Deaths: '+s.deaths+'</p><p>Emergencies: '+s.emergencies+'</p><p>Ambulances: '+s.ambulances+'</p><p>Surgeries: '+s.surgeries+'</p><p>Complaints: '+s.complaints+'</p><p>Compliments: '+s.compliments+'</p><p>Your needs: energy '+Math.round(G.player.energy)+', hunger '+Math.round(G.player.hunger)+', thirst '+Math.round(G.player.thirst)+', morale '+Math.round(G.player.morale)+'.</p></div><div class="card"><h2>Achievements</h2>'+ach+'</div><div class="card"><button onclick="playerBreak()">Eat, drink and rest briefly</button><button onclick="render()">Back</button></div>'}
function playerBreak(){play('tea');G.player.energy=Math.min(100,G.player.energy+22);G.player.hunger=Math.max(0,G.player.hunger-40);G.player.thirst=Math.max(0,G.player.thirst-40);G.player.morale=Math.min(100,G.player.morale+4);tick(12);log('You took a short break.');statsView()}
function settingsView(){app.innerHTML='<div class="card"><h2>Settings</h2><button onclick="audioOn=!audioOn;settingsView()">Sound: '+(audioOn?'On':'Off')+'</button><button onclick="G.settings.voice=!G.settings.voice;save();settingsView()">Voice: '+(G.settings.voice?'On':'Off')+'</button><button onclick="save();log(\'Game saved manually.\');render()">Save</button><button class="danger" onclick="resetGame()">Reset Whole Hospital</button><button onclick="render()">Back</button></div>'}
function resetGame(){if(confirm('Reset the whole hospital save?')){localStorage.removeItem('hospitalDoctorFullSave');G=copy(DEFAULT);initDefaults();render()}}
setInterval(()=>{if(G.started){tick(1);status()}},60000);
render();
</script>
</main>
</body>
